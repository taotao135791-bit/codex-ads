name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  python-quality:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Run complete cross-platform test suite
        run: python -m pytest -q

      - name: Generate UAC Markdown report
        run: >-
          python scripts/uac_experiment.py analyze
          skills/ads-google-app/assets/UAC-INPUT.example.yaml
          --json-output "${{ runner.temp }}/uac-analysis.json"
          --markdown-output "${{ runner.temp }}/uac-report.md"

      - name: Verify UAC report artifact
        run: >-
          python -c "from pathlib import Path;
          report=(Path(r'${{ runner.temp }}')/'uac-report.md').read_text(encoding='utf-8');
          assert '# UAC Experiment Loop Report' in report;
          assert '## 14. 置信度和数据缺口' in report"

  foundation-contracts:
    name: Foundation contracts / ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Enforce repository lint, formatting, and typed UAC core
        run: |
          ruff check .
          ruff format --check .
          python -m mypy scripts/codex_ads/uac

      - name: Run fixture, schema, CLI compatibility, workspace, and privacy contracts
        run: |
          python -m pytest -q \
            tests/scripts/test_uac_experiment_fixtures.py \
            tests/uac/test_uac_migration.py \
            tests/uac/test_uac_modularization.py \
            tests/uac/test_uac_workspace.py \
            tests/audit/test_privacy_doctor.py

      - name: Verify canonical router mirror
        run: |
          python scripts/sync_skill_layout.py --check
          python scripts/privacy_doctor.py --json

      - name: Validate schema and legacy ledger commands explicitly
        run: |
          python scripts/uac_experiment.py validate-ledger \
            skills/ads-google-app/assets/ADS-EXPERIMENTS.example.yaml
          python scripts/uac_experiment.py review-ledger \
            skills/ads-google-app/assets/ADS-EXPERIMENTS.example.yaml
          python scripts/uac_experiment.py migrate-ledger \
            skills/ads-google-app/assets/ADS-EXPERIMENTS.minimal.yaml

      - name: Run read-only UAC Doctor smoke
        run: >-
          python scripts/uac_experiment.py doctor .
          --input skills/ads-google-app/assets/UAC-INPUT.example.yaml
          --ledger skills/ads-google-app/assets/ADS-EXPERIMENTS.minimal.yaml
          --json

      - name: Run normalization and replay smoke
        run: |
          python scripts/uac_experiment.py normalize \
            examples/normalization/uac-flat-input.yaml \
            --output "${RUNNER_TEMP}/uac-normalized.json"
          python scripts/uac_experiment.py replay \
            examples/replays/example-anonymized --json

      - name: Run Quick Decision smoke
        run: |
          python scripts/uac_experiment.py decide \
            skills/ads-google-app/assets/UAC-QUICK-OPS.example.yaml \
            --json \
            --json-output "${RUNNER_TEMP}/uac-quick-decision.json" \
            --markdown-output "${RUNNER_TEMP}/uac-quick-decision.md"
          python -c "import json; from pathlib import Path; result=json.loads(Path('${RUNNER_TEMP}/uac-quick-decision.json').read_text(encoding='utf-8')); assert result['mode'] == 'quick_decision'; assert result['account_write'] is False; assert result['ledger_write'] is False"
          grep -q '^结论：' "${RUNNER_TEMP}/uac-quick-decision.md"

      - name: Run deterministic numeric Quick Decision smoke
        run: |
          python scripts/uac_experiment.py decide \
            skills/ads-google-app/assets/UAC-QUICK-NUMERIC.example.yaml \
            --json-output "${RUNNER_TEMP}/uac-quick-numeric-a.json"
          python scripts/uac_experiment.py decide \
            skills/ads-google-app/assets/UAC-QUICK-NUMERIC.example.yaml \
            --json-output "${RUNNER_TEMP}/uac-quick-numeric-b.json"
          cmp "${RUNNER_TEMP}/uac-quick-numeric-a.json" \
            "${RUNNER_TEMP}/uac-quick-numeric-b.json"
          python -c "import json; from pathlib import Path; result=json.loads(Path('${RUNNER_TEMP}/uac-quick-numeric-a.json').read_text(encoding='utf-8')); assert result['mode'] == 'quick_decision'; assert result['derived_signals']['has_numeric_evidence'] is True; assert result['constraint_analysis']['primary_constraint'] == 'TARGET_LIKELY_TOO_TIGHT'; assert result['target_recommendation']['recommended_action'] == 'INCREASE'; assert result['target_recommendation']['recommended_value'] == 5.5; assert result['budget_recommendation']['recommended_action'] == 'NO_CHANGE'; assert result['calculation_evidence']; assert result['account_write'] is False; assert result['ledger_write'] is False"

      - name: Run private workspace workflow smoke
        run: |
          python scripts/uac_experiment.py init-workspace "CI Workspace" \
            --root "${RUNNER_TEMP}/workspaces"
          cp skills/ads-google-app/assets/UAC-INPUT.example.yaml \
            "${RUNNER_TEMP}/workspaces/CI Workspace/input/account export.yaml"
          python scripts/uac_experiment.py normalize \
            --workspace "${RUNNER_TEMP}/workspaces/CI Workspace"
          python scripts/uac_experiment.py doctor \
            --workspace "${RUNNER_TEMP}/workspaces/CI Workspace" --json
          python scripts/uac_experiment.py analyze \
            --workspace "${RUNNER_TEMP}/workspaces/CI Workspace"
          test -f "${RUNNER_TEMP}/workspaces/CI Workspace/analysis/UAC-ANALYSIS.json"
          test -f "${RUNNER_TEMP}/workspaces/CI Workspace/reports/UAC-REPORT.md"

          python scripts/uac_experiment.py init-workspace "CI Quick Workspace" \
            --root "${RUNNER_TEMP}/workspaces"
          cp skills/ads-google-app/assets/UAC-QUICK-OPS.example.yaml \
            "${RUNNER_TEMP}/workspaces/CI Quick Workspace/input/account export.yaml"
          python scripts/uac_experiment.py normalize \
            --workspace "${RUNNER_TEMP}/workspaces/CI Quick Workspace"
          python scripts/uac_experiment.py decide \
            --workspace "${RUNNER_TEMP}/workspaces/CI Quick Workspace"
          test -f "${RUNNER_TEMP}/workspaces/CI Quick Workspace/analysis/UAC-QUICK-DECISION.json"
          test -f "${RUNNER_TEMP}/workspaces/CI Quick Workspace/reports/UAC-QUICK-DECISION.md"

      - name: Run schema migration preview and knowledge Doctor
        run: |
          python scripts/uac_experiment.py migrate-ledger \
            skills/ads-google-app/assets/ADS-EXPERIMENTS.minimal.yaml
          python scripts/knowledge_doctor.py --json

  core-coverage:
    name: UAC core coverage / ubuntu-latest
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-dev.txt

      - name: Measure the real UAC package and enforce the floor
        run: >-
          python -m pytest -q
          --cov=codex_ads.uac
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=80

      - name: Upload UAC coverage XML
        uses: actions/upload-artifact@v4
        with:
          name: uac-core-coverage-${{ github.sha }}
          path: coverage.xml
          if-no-files-found: error

  installer-smoke:
    name: Installer smoke / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install UAC smoke dependencies
        run: python -m pip install --disable-pip-version-check PyYAML jsonschema

      - name: Validate and run Unix installer
        if: runner.os != 'Windows'
        shell: bash
        env:
          CODEX_ADS_REPO_URL: ${{ github.workspace }}
        run: |
          bash -n install.sh
          bash install.sh \
            --target=cursor \
            --skill-dir="${RUNNER_TEMP}/codex-ads-skills" \
            --agent-dir="${RUNNER_TEMP}/codex-ads-agents"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/UAC-INPUT.example.yaml"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/UAC-QUICK-OPS.example.yaml"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/UAC-QUICK-NUMERIC.example.yaml"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/ads-experiments.schema.json"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/uac-quick-decision.schema.json"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/SKILL.md"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/references/agent-workflow.md"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/references/quick-ops.md"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/uac_experiment.py"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/codex_ads/uac/engine.py"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/codex_ads/uac/quick_ops.py"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/codex_ads/uac/signals.py"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/codex_ads/uac/numeric_decision.py"
          test -f "${RUNNER_TEMP}/codex-ads-skills/ads/VERSION"
          mkdir -p "${RUNNER_TEMP}/installed-uac-project"
          cp "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/UAC-INPUT.example.yaml" \
            "${RUNNER_TEMP}/installed-uac-project/UAC-INPUT.yaml"
          cp "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/ADS-EXPERIMENTS.minimal.yaml" \
            "${RUNNER_TEMP}/installed-uac-project/ADS-EXPERIMENTS.yaml"
          python "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/uac_experiment.py" --help
          python "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/uac_experiment.py" doctor \
            "${RUNNER_TEMP}/installed-uac-project" --json
          python "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/uac_experiment.py" decide \
            "${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/UAC-QUICK-OPS.example.yaml" \
            --json
          numeric_input="${RUNNER_TEMP}/codex-ads-skills/ads-google-app/assets/UAC-QUICK-NUMERIC.example.yaml"
          numeric_a="${RUNNER_TEMP}/installed-uac-numeric-a.json"
          numeric_b="${RUNNER_TEMP}/installed-uac-numeric-b.json"
          python "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/uac_experiment.py" decide \
            "${numeric_input}" --json-output "${numeric_a}"
          python "${RUNNER_TEMP}/codex-ads-skills/ads/scripts/uac_experiment.py" decide \
            "${numeric_input}" --json-output "${numeric_b}"
          cmp "${numeric_a}" "${numeric_b}"
          python -c "import json; from pathlib import Path; result=json.loads(Path('${numeric_a}').read_text(encoding='utf-8')); assert result['derived_signals']['has_numeric_evidence'] is True; assert result['constraint_analysis']['primary_constraint'] == 'TARGET_LIKELY_TOO_TIGHT'; assert result['target_recommendation']['recommended_action'] == 'INCREASE'; assert result['target_recommendation']['recommended_value'] == 5.5; assert result['budget_recommendation']['recommended_action'] == 'NO_CHANGE'; assert result['account_write'] is False; assert result['ledger_write'] is False"

      - name: Run Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          CODEX_ADS_REPO_URL: ${{ github.workspace }}
        run: |
          $skillDir = Join-Path $env:RUNNER_TEMP "codex-ads-skills"
          $agentDir = Join-Path $env:RUNNER_TEMP "codex-ads-agents"
          ./install.ps1 -Target cursor -SkillDir $skillDir -AgentDir $agentDir
          $required = @(
            (Join-Path $skillDir "ads-google-app/assets/UAC-INPUT.example.yaml"),
            (Join-Path $skillDir "ads-google-app/assets/UAC-QUICK-OPS.example.yaml"),
            (Join-Path $skillDir "ads-google-app/assets/UAC-QUICK-NUMERIC.example.yaml"),
            (Join-Path $skillDir "ads-google-app/assets/ads-experiments.schema.json"),
            (Join-Path $skillDir "ads-google-app/assets/uac-quick-decision.schema.json"),
            (Join-Path $skillDir "ads-google-app/SKILL.md"),
            (Join-Path $skillDir "ads-google-app/references/agent-workflow.md"),
            (Join-Path $skillDir "ads-google-app/references/quick-ops.md"),
            (Join-Path $skillDir "ads/scripts/uac_experiment.py"),
            (Join-Path $skillDir "ads/scripts/codex_ads/uac/engine.py"),
            (Join-Path $skillDir "ads/scripts/codex_ads/uac/quick_ops.py"),
            (Join-Path $skillDir "ads/scripts/codex_ads/uac/signals.py"),
            (Join-Path $skillDir "ads/scripts/codex_ads/uac/numeric_decision.py"),
            (Join-Path $skillDir "ads/VERSION")
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path -PathType Leaf)) {
              throw "Missing installed artifact: $path"
            }
          }
          $projectDir = Join-Path $env:RUNNER_TEMP "installed-uac-project"
          New-Item -ItemType Directory -Path $projectDir -Force | Out-Null
          Copy-Item (Join-Path $skillDir "ads-google-app/assets/UAC-INPUT.example.yaml") `
            -Destination (Join-Path $projectDir "UAC-INPUT.yaml")
          Copy-Item (Join-Path $skillDir "ads-google-app/assets/ADS-EXPERIMENTS.minimal.yaml") `
            -Destination (Join-Path $projectDir "ADS-EXPERIMENTS.yaml")
          $installedScript = Join-Path $skillDir "ads/scripts/uac_experiment.py"
          $quickInput = Join-Path $skillDir "ads-google-app/assets/UAC-QUICK-OPS.example.yaml"
          python $installedScript --help
          python $installedScript doctor $projectDir --json
          python $installedScript decide $quickInput --json
          $numericInput = Join-Path $skillDir "ads-google-app/assets/UAC-QUICK-NUMERIC.example.yaml"
          $numericA = Join-Path $env:RUNNER_TEMP "installed-uac-numeric-a.json"
          $numericB = Join-Path $env:RUNNER_TEMP "installed-uac-numeric-b.json"
          python $installedScript decide $numericInput --json-output $numericA
          python $installedScript decide $numericInput --json-output $numericB
          $numericTextA = Get-Content -LiteralPath $numericA -Raw -Encoding UTF8
          $numericTextB = Get-Content -LiteralPath $numericB -Raw -Encoding UTF8
          if ($numericTextA -cne $numericTextB) {
            throw "Numeric Quick Decision output is not deterministic"
          }
          $numericResult = $numericTextA | ConvertFrom-Json
          if (-not $numericResult.derived_signals.has_numeric_evidence) {
            throw "Numeric Quick Decision did not detect numeric evidence"
          }
          if ($numericResult.constraint_analysis.primary_constraint -ne "TARGET_LIKELY_TOO_TIGHT") {
            throw "Numeric Quick Decision result changed from its stable example contract"
          }
          if ($numericResult.target_recommendation.recommended_action -ne "INCREASE") {
            throw "Numeric Quick Decision result changed from its stable example contract"
          }
          if ($numericResult.target_recommendation.recommended_value -ne 5.5) {
            throw "Numeric Quick Decision result changed from its stable example contract"
          }
          if ($numericResult.budget_recommendation.recommended_action -ne "NO_CHANGE") {
            throw "Numeric Quick Decision result changed from its stable example contract"
          }
          if ($numericResult.account_write -ne $false) {
            throw "Numeric Quick Decision must remain read-only"
          }
          if ($numericResult.ledger_write -ne $false) {
            throw "Numeric Quick Decision must remain read-only"
          }
