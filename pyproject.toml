[tool.mypy]
python_version = "3.10"
files = [
  "scripts/codex_ads/uac/models.py",
  "scripts/codex_ads/uac/normalization.py",
  "scripts/codex_ads/uac/replay.py",
  "scripts/codex_ads/uac/doctor.py",
  "scripts/codex_ads/uac/version.py",
]
check_untyped_defs = true
disallow_untyped_defs = true
ignore_missing_imports = true
no_implicit_optional = true
show_error_codes = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unreachable = true
